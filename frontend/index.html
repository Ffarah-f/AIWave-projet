<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinguaSense | Traducteur IA Multilingue</title>
    <meta name="description"
        content="LinguaSense est un traducteur IA rapide et intelligent permettant de traduire facilement vos textes dans plusieurs langues.">
    <meta name="keywords"
        content="traducteur IA, traduction intelligente, traduction multilingue, traduction français anglais">
    <meta name="author" content="LinguaSense">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://www.linguasense.com/">
    <link rel="alternate" hreflang="fr" href="https://www.linguasense.com/">
    <link rel="alternate" hreflang="en" href="https://www.linguasense.com/en/">
    <meta property="og:title" content="LinguaSense | Traducteur IA">
    <meta property="og:description" content="Traducteur IA multilingue rapide et intelligent.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://www.linguasense.com/">
    <meta property="og:image" content="https://www.linguasense.com/assets/Logo.png">
    <meta name="twitter:card" content="summary_large_image">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/png" href="assets/favicon.png">
</head>

<body>
    <header>
        <div class="navbar">
            <a href="index.html" class="logo-container" aria-label="Accueil LinguaSense">
                <img src="assets/Logo.png" alt="Logo LinguaSense" class="logo" width="120" height="120">
                <span class="brand-name">LINGUASENSE</span>
            </a>
            <nav id="mainNav" class="nav-links" aria-label="Navigation principale">
                <a id="navHistory" href="history.html" class="btn-nav" title="Historique des traductions">Historique</a>
                <a id="navUpgrade" href="upgrade.html" class="btn-nav" title="Version premium">Améliorer</a>
                <div class="user-icon">
                    <a id="navLogin" href="login.html" title="Se connecter">
                    <img src="https://cdn-icons-png.flaticon.com/512/1077/1077114.png" alt="Profil utilisateur"
                        width="40" height="40" loading="lazy">
                    </a>
                </div>
            </nav>
        </div>
    </header>

    <main id="translatorPage" class="translator-container">
        <h1 id="translatorTitle">Traducteur IA Multilingue</h1>

        <!-- Translation counter for free users -->
        <div id="translationCounter" class="translation-counter" style="display: none;">
            <span id="counterText">Traductions utilisées: <strong id="counterValue">0/15</strong></span>
        </div>

        <section class="translation-box">
            <div class="top-row">
                <div class="lang-selectors">
                    <label for="source-lang" class="sr-only">Langue source</label>
                    <select id="source-lang" name="source-lang" class="select-box">
                        <option value="auto">Langue d'origine</option>
                        <option value="ar">Arabe</option>
                        <option value="de">Allemand</option>
                        <option value="fr">Français</option>
                        <option value="en">Anglais</option>
                        <option value="es">Espagnol</option>
                        <option value="it">Italien</option>
                        <option value="ja">Japonais</option>
                        <option value="ko">Coreen</option>
                        <option value="nl">Neerlandais</option>
                        <option value="pt">Portugais</option>
                        <option value="ru">Russe</option>
                        <option value="tr">Turc</option>
                        <option value="zh">Chinois</option>
                    </select>
                    <label for="target-lang" class="sr-only">Langue cible</label>
                    <select id="target-lang" name="target-lang" class="select-box">
                        <option value="">Langue cible</option>
                        <option value="ar">Arabe</option>
                        <option value="de">Allemand</option>
                        <option value="en">Anglais</option>
                        <option value="es">Espagnol</option>
                        <option value="fr">Français</option>
                        <option value="it">Italien</option>
                        <option value="ja">Japonais</option>
                        <option value="ko">Coreen</option>
                        <option value="nl">Neerlandais</option>
                        <option value="pt">Portugais</option>
                        <option value="ru">Russe</option>
                        <option value="tr">Turc</option>
                        <option value="zh">Chinois</option>
                    </select>
                </div>
                <label for="context" class="sr-only">Contexte</label>
                <textarea id="context" class="input-context" placeholder="Contexte (Optionnel)"
                    aria-label="Contexte de traduction"></textarea>
            </div>
            <div class="text-areas">
                <label for="text-input" class="sr-only">Texte à traduire</label>
                <textarea id="text-input" class="text-input" placeholder="Veuillez saisir votre texte..."
                    aria-label="Texte à traduire"></textarea>
                <div id="translationOutput" class="text-output" aria-live="polite">
                    <p class="placeholder-text">Résultat...</p>
                </div>
            </div>
        </section>
        <button id="translateBtn" class="btn-translate" type="button" aria-label="Traduire">Traduire</button>

        <section class="chat-box" aria-labelledby="chatTitle">
            <div class="chat-header">
                <h2 id="chatTitle">Assistant IA</h2>
            </div>
            <div id="chatMessages" class="chat-messages" aria-live="polite">
                <p class="chat-placeholder">Posez une question sur une traduction, une expression ou un contexte.</p>
            </div>
            <form id="chatForm" class="chat-form">
                <label for="chat-input" class="sr-only">Message pour l'assistant IA</label>
                <textarea id="chat-input" class="chat-input" placeholder="Votre message..."
                    aria-label="Message pour l'assistant IA"></textarea>
                <button id="chatBtn" class="btn-chat" type="submit">Envoyer</button>
            </form>
        </section>
    </main>

    <footer class="footer">
        <p>&copy; 2026 LinguaSense. Tous droits réservés.</p>
    </footer>

    <!-- Firebase: must be type="module" -->
    <script type="module" src="js/auth.js"></script>
    <script type="module" src="js/translate.js"></script>
</body>

</html>
