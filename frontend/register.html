<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>LinguaSense | Inscription</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="css/style.css">
    </head>
    <body>
        <header>
            <div class="navbar">
                <a href="index.html" class="logo-container" aria-label="Accueil LinguaSense">
                    <img src="assets/Logo.png" alt="Logo LinguaSense" class="logo" width="120" height="120">
                    <span class="brand-name">LINGUASENSE</span>
                </a>
                <nav id="mainNav" class="nav-links" aria-label="Navigation principale">
                    <a id="navLogin" href="login.html" class="btn-nav" title="Se connecter">Se connecter</a>
                    <a id="navUpgrade" href="upgrade.html" class="btn-nav" title="Version premium">Améliorer</a>
                    <div class="user-icon">
                        <a id="navLoginIcon" href="login.html" title="Se connecter">
                            <img src="https://cdn-icons-png.flaticon.com/512/1077/1077114.png" alt="Profil utilisateur"
                                width="40" height="40" loading="lazy">
                        </a>
                    </div>
                </nav>
            </div>
        </header>

        <main id="registerPage">
            <div class="login-container">
                <h1 id="registerTitle">Inscription à LinguaSense</h1>
                <form id="registerForm" class="login-form">
                    <label for="name">Nom complet</label>
                    <input type="text" id="name" name="name" required placeholder="Entrez votre nom complet">
                    <label for="email">Adresse e-mail</label>
                    <input type="email" id="email" name="email" required placeholder="Entrez votre adresse e-mail">
                    <label for="password">Mot de passe</label>
                    <input type="password" id="password" name="password" required placeholder="Entrez votre mot de passe">
                    <button id="registerSubmit" type="submit" class="btn-login">S'inscrire</button>
                </form>
                <p id="loginLink" class="login-link">Déjà un compte ? <a href="login.html">Se connecter</a></p>
            </div>
        </main>

        <footer class="footer">
            <p>&copy; 2026 LinguaSense. Tous droits réservés.</p>
        </footer>

        <!-- Firebase: must be type="module" -->
        <script type="module" src="js/auth.js"></script>
    </body>
</html>
