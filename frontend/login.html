<!DOCTYPE html>
<html lang="fr">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>LinguaSense | Traducteur IA Multilingue</title>
        <meta name="description"
            content="LinguaSense est un traducteur IA rapide et intelligent permettant de traduire facilement vos textes dans plusieurs langues.">
        <meta name="keywords"
            content="traducteur IA, traduction intelligente, traduction multilingue, traduction français anglais">
        <meta name="author" content="LinguaSense">
        <meta name="robots" content="index, follow">
        <link rel="canonical" href="https://www.linguasense.com/">
        <link rel="alternate" hreflang="fr" href="https://www.linguasense.com/">
        <link rel="alternate" hreflang="en" href="https://www.linguasense.com/en/">
        <meta property="og:title" content="LinguaSense | Traducteur IA">
        <meta property="og:description" content="Traducteur IA multilingue rapide et intelligent.">
        <meta property="og:type" content="website">
        <meta property="og:url" content="https://www.linguasense.com/">
        <meta property="og:image" content="https://www.linguasense.com/assets/Logo.png">
        <meta name="twitter:card" content="summary_large_image">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="css/style.css">
        <link rel="icon" type="image/png" href="assets/favicon.png">
    </head>

    <body>
        <header>
            <div class="navbar">
                <a href="index.html" class="logo-container" aria-label="Accueil LinguaSense">
                    <img src="assets/Logo.png" alt="Logo LinguaSense" class="logo" width="120" height="120">
                    <span class="brand-name">LINGUASENSE</span>
                </a>
                <nav class="nav-links" aria-label="Navigation principale">
                    <a href="register.html" class="btn-nav" title="S'inscrire">S'inscrire</a>
                    <a href="upgrade.html" class="btn-nav" title="Version premium">Améliorer</a>
                    <div class="user-icon">
                        <a href="login.html" title="Se connecter">
                            <img src="https://cdn-icons-png.flaticon.com/512/1077/1077114.png" alt="Profil utilisateur"
                                width="40" height="40" loading="lazy">
                        </a>
                </div>
                </nav>
            </div>
        </header>
        <main>
            <div class="login-container">
                <h1>Connexion à LinguaSense</h1>
                <form action="/login" method="POST" class="login-form">
                    <label for="email">Adresse e-mail</label>
                    <input type="email" id="email" name="email" required placeholder="Entrez votre adresse e-mail">
                    <label for="password">Mot de passe</label>
                    <input type="password" id="password" name="password" required placeholder="Entrez votre mot de passe">
                    <button type="submit" class="btn-login">Se connecter</button>
                </form>
                <p class="register-link">Pas de compte ? <a href="register.html">S'inscrire</a></p>
            </div>
        </main>
        <footer class="footer">
            <p>&copy; 2026 LinguaSense. Tous droits réservés.</p>   
        </footer>
    </body>
</html>
